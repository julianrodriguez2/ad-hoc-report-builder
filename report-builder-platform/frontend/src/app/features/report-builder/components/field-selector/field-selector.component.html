<p-panel header="Available Fields">
  @if (availableFields.length === 0) {
    <p class="empty-state">Select a dataset to load fields.</p>
  } @else {
    <div class="field-list">
      @for (field of availableFields; track field.id) {
        <label class="field-item" [for]="field.id">
          <input
            type="checkbox"
            [id]="field.id"
            [checked]="isSelected(field.fieldName)"
            (change)="onFieldToggled(field.fieldName, $event)"
          />
          <span>{{ field.displayName }}</span>
        </label>
      }
    </div>
  }
</p-panel>
