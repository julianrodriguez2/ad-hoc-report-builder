<p-panel header="Field Selector">
  <p class="field-help">Drag selected fields to set output order.</p>
  <div class="field-list" cdkDropList (cdkDropListDropped)="drop($event)">
    @for (field of fields; track field.fieldName) {
      <div class="field-item" cdkDrag>
        <i class="pi pi-bars"></i>
        <span>{{ field.displayName }}</span>
        <small>{{ field.dataType }}</small>
      </div>
    }
  </div>
</p-panel>
